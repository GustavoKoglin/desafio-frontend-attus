version: '3.8'

services:
  backend:
    build:
      context: ./attus-backend
    container_name: attus_backend
    ports:
      - "3000:3000"
    volumes:
      - ./attus-backend/db.json:/app/db.json
    restart: always

  frontend:
    build:
      context: ./attus-frontend
    container_name: attus_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always
