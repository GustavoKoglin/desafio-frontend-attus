<div class="list-container">
  <div class="header-container">
    <h2>Painel de Auditoria (Logs)</h2>
    <button mat-stroked-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      Voltar
    </button>
  </div>

  @if (loading) {
    <p>Carregando logs...</p>
  } @else {
    <div class="logs-grid">
      @for (log of logs; track log.id) {
        <mat-card class="log-card">
          <mat-card-header>
            <mat-icon mat-card-avatar>history</mat-icon>
            <mat-card-title>{{ log.action }}</mat-card-title>
            <mat-card-subtitle>{{ log.date }} às {{ log.time }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <p><strong>Autor:</strong> {{ log.authorName }} ({{ log.authorEmail }})</p>
            <p><strong>Fuso Horário:</strong> {{ log.timezone }}</p>
            <p><strong>Local (IP):</strong> {{ log.local }}</p>
          </mat-card-content>
        </mat-card>
      }
    </div>
  }
</div>
